<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDI Power - Bot Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .chat-container {
            max-width: 600px;
            margin: 40px auto;
            height: 80vh;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.7);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message img {
            display: block;
            max-width: 100%;
            border-radius: 8px;
            margin-top: 15px;
        }

        .chat-input {
            padding: 20px;
            background: rgba(15, 23, 42, 0.7);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        .chat-input button {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-indigo));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(6, 182, 212, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Loading indicator */
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>KDI Power Bot Tester</h2>
            <a href="/dashboard" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Back to Dashboard</a>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                Hello! I am the KDI Power AI Assistant. This is a testing interface. Try asking me for a quote on House Wires!
            </div>
            <div class="typing-indicator" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Simulate a phone number for testing
        const testPhone = "919999999999";
        
        const messagesDiv = document.getElementById('chat-messages');
        const inputField = document.getElementById('message-input');
        const typingIndicator = document.getElementById('typing-indicator');

        function appendMessage(text, sender, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            // Format newlines
            let formattedText = text.replace(/\n/g, '<br>');
            msgDiv.innerHTML = formattedText;
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = '/static/images/' + imageUrl;
                img.onerror = function() { this.style.display = 'none'; };
                msgDiv.appendChild(img);
            }
            
            messagesDiv.insertBefore(msgDiv, typingIndicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            inputField.value = '';
            appendMessage(text, 'user');
            
            typingIndicator.style.display = 'block';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch('/api/test-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: testPhone,
                        message: text,
                        profile_name: "Test User"
                    })
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                if (data.reply) {
                    appendMessage(data.reply, 'bot', data.image);
                } else if (data.error) {
                    appendMessage("Error: " + data.error, 'bot');
                }
            } catch (err) {
                typingIndicator.style.display = 'none';
                appendMessage("Failed to connect to backend.", 'bot');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
